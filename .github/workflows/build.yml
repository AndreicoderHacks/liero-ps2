name: Build Liero PS2

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Folosim imaginea Docker oficială ps2dev — toolchain 100% stabil
      - name: Build in ps2dev Docker
        uses: docker://ps2dev/ps2dev:latest
        with:
          entrypoint: /bin/sh
          args: >-
            -c "
            export PS2DEV=/usr/local/ps2dev &&
            export PS2SDK=$PS2DEV/ps2sdk &&
            export GSKIT=$PS2DEV/gsKit &&
            export PATH=$PATH:$PS2DEV/bin:$PS2DEV/ee/bin &&
            cd /github/workspace &&
            make clean &&
            make 2>&1
            "

      - name: Verifică ELF generat
        run: |
          ls -lh liero.elf
          file liero.elf

      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: liero-ps2-elf
          path: liero.elf
          if-no-files-found: error

      - name: Upload ELF la release (doar pe tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: liero.elf
