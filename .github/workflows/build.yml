name: PS2 Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ps2dev/ps2dev:latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apk add --no-cache make gcc g++ bash || \
          (apt-get update && apt-get install -y make gcc g++)

      - name: Build project
        run: |
          make

      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: liero-ps2
          path: liero.elf
